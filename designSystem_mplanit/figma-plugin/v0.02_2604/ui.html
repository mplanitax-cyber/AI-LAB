<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landing Page Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0F0F0F;
    --surface: #1A1A1A;
    --border: #2A2A2A;
    --accent: #FF2D78;
    --accent2: #FF6B00;
    --text: #F0F0F0;
    --muted: #666;
    --success: #4CAF50;
    --radius: 8px;
  }

  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
    background: var(--bg);
    color: var(--text);
    width: 284px;
    padding: 16px;
    font-size: 12px;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 18px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s infinite;
    flex-shrink: 0;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .header-title { font-size: 13px; font-weight: 700; letter-spacing: -0.3px; }
  .header-badge {
    margin-left: auto;
    font-size: 9px; padding: 2px 6px;
    background: rgba(255,45,120,0.15);
    color: var(--accent);
    border-radius: 20px;
    border: 1px solid rgba(255,45,120,0.3);
    letter-spacing: 0.5px;
  }

  /* ── Section & Label ── */
  .section { margin-bottom: 14px; }
  .label {
    font-size: 10px; font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  /* ── Client Grid ── */
  .client-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; }
  .client-btn {
    padding: 8px 4px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--muted);
    font-size: 11px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
    text-align: center; line-height: 1.3;
  }
  .client-btn:hover { border-color: #444; color: var(--text); }
  .client-btn.active { border-color: var(--accent); color: var(--text); background: rgba(255,45,120,0.1); }
  .client-btn .dot {
    display: block; width: 6px; height: 6px;
    border-radius: 50%; margin: 0 auto 4px;
    background: var(--border); transition: background 0.15s;
  }
  .client-btn[data-client="AIA"] .dot    { background: #D4003F; }
  .client-btn[data-client="흥국"] .dot   { background: #FF6B00; }
  .client-btn[data-client="엠플"] .dot   { background: #FF2D78; }

  /* ── Type Grid ── */
  .type-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; }
  .type-btn {
    padding: 7px 4px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--muted);
    font-size: 10px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; text-align: center;
  }
  .type-btn:hover { border-color: #444; color: var(--text); }
  .type-btn.active { border-color: var(--accent2); color: var(--text); background: rgba(255,107,0,0.1); }

  /* ── Dropzone ── */
  .dropzone {
    border: 1.5px dashed var(--border);
    border-radius: var(--radius);
    padding: 16px; text-align: center;
    cursor: pointer; transition: all 0.15s;
    background: var(--surface); position: relative;
  }
  .dropzone:hover, .dropzone.drag-over { border-color: var(--accent); background: rgba(255,45,120,0.05); }
  .dropzone input {
    position: absolute; inset: 0; opacity: 0;
    cursor: pointer; width: 100%; height: 100%;
  }
  .drop-icon { font-size: 20px; margin-bottom: 6px; display: block; }
  .drop-text { color: var(--muted); font-size: 11px; line-height: 1.5; }
  .drop-text strong { color: var(--accent); font-weight: 600; }

  .file-info {
    display: none; align-items: center; gap: 8px;
    padding: 8px 10px;
    background: rgba(255,45,120,0.08);
    border: 1.5px solid rgba(255,45,120,0.3);
    border-radius: var(--radius); margin-top: 6px;
  }
  .file-info.visible { display: flex; }
  .file-name { font-size: 11px; color: var(--text); font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-size { font-size: 10px; color: var(--muted); flex-shrink: 0; }
  .file-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 0; line-height: 1; }
  .file-remove:hover { color: var(--accent); }

  /* ── Divider ── */
  .divider { height: 1px; background: var(--border); margin: 14px 0; }

  /* ── Generate Button ── */
  .generate-btn {
    width: 100%; padding: 13px;
    background: var(--accent); border: none;
    border-radius: var(--radius); color: white;
    font-size: 13px; font-weight: 700; cursor: pointer;
    transition: all 0.15s; letter-spacing: -0.2px;
    margin-top: 4px; position: relative; overflow: hidden;
  }
  .generate-btn:hover:not(:disabled) { background: #e0256a; transform: translateY(-1px); }
  .generate-btn:active:not(:disabled) { transform: translateY(0); }
  .generate-btn:disabled { background: #2a2a2a; color: var(--muted); cursor: not-allowed; }

  /* ── Progress ── */
  .progress-wrap {
    display: none; margin-top: 12px;
    padding: 12px; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius);
  }
  .progress-wrap.visible { display: block; }
  .progress-header {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 10px; font-size: 11px; color: var(--muted);
  }
  .spinner {
    width: 13px; height: 13px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite; flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .step-list { display: flex; flex-direction: column; gap: 4px; }
  .step-row {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; padding: 2px 0; transition: color 0.2s;
  }
  .step-row.pending { color: var(--muted); }
  .step-row.active  { color: var(--text); }
  .step-row.done    { color: var(--success); }
  .step-dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    background: var(--border); transition: background 0.2s;
  }
  .step-row.active .step-dot  { background: var(--accent); }
  .step-row.done .step-dot    { background: var(--success); }

  /* ── Success ── */
  .success {
    display: none; flex-direction: column; align-items: center; gap: 6px;
    padding: 16px; margin-top: 10px;
    background: rgba(76,175,80,0.08);
    border: 1px solid rgba(76,175,80,0.3);
    border-radius: var(--radius); text-align: center;
  }
  .success.visible { display: flex; }
  .success-icon { font-size: 24px; }
  .success-title { font-size: 12px; font-weight: 700; color: var(--success); }
  .success-sub { font-size: 10px; color: var(--muted); }
  .reset-btn {
    margin-top: 8px; padding: 6px 14px;
    background: none; border: 1px solid var(--border);
    border-radius: 20px; color: var(--muted);
    font-size: 10px; cursor: pointer; transition: all 0.15s;
  }
  .reset-btn:hover { border-color: #555; color: var(--text); }

  /* ── Error ── */
  .error-box {
    display: none; padding: 10px 12px; margin-top: 10px;
    background: rgba(244,67,54,0.08);
    border: 1px solid rgba(244,67,54,0.3);
    border-radius: var(--radius); font-size: 11px; color: #F44336;
  }
  .error-box.visible { display: block; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo-dot"></div>
  <span class="header-title">Landing Generator</span>
  <span class="header-badge">AI</span>
</div>

<!-- 클라이언트 선택 -->
<div class="section">
  <div class="label">클라이언트</div>
  <div class="client-grid">
    <button class="client-btn" data-client="AIA" onclick="selectClient(this)">
      <span class="dot"></span>AIA생명
    </button>
    <button class="client-btn" data-client="흥국" onclick="selectClient(this)">
      <span class="dot"></span>흥국화재
    </button>
    <button class="client-btn active" data-client="엠플" onclick="selectClient(this)">
      <span class="dot"></span>엠플랜잇
    </button>
  </div>
</div>

<!-- 페이지 타입 -->
<div class="section">
  <div class="label">페이지 타입</div>
  <div class="type-grid">
    <button class="type-btn active" data-type="landing" onclick="selectType(this)">🏠 랜딩</button>
    <button class="type-btn" data-type="event"   onclick="selectType(this)">🎯 이벤트</button>
    <button class="type-btn" data-type="product" onclick="selectType(this)">📦 상품소개</button>
  </div>
</div>

<!-- 기획서 업로드 -->
<div class="section">
  <div class="label">기획서 업로드 <span style="color:var(--muted);font-weight:400;text-transform:none;">(선택)</span></div>
  <div class="dropzone" id="dropzone"
    ondragover="handleDragOver(event)"
    ondragleave="handleDragLeave(event)"
    ondrop="handleDrop(event)">
    <input type="file" id="fileInput" accept=".pdf" onchange="handleFile(event)">
    <span class="drop-icon">📄</span>
    <div class="drop-text">
      <strong>클릭</strong> 또는 드래그앤드롭<br>PDF 파일만 지원
    </div>
  </div>
  <div class="file-info" id="fileInfo">
    <span class="file-name" id="fileName">—</span>
    <span class="file-size" id="fileSize"></span>
    <button class="file-remove" onclick="removeFile()">✕</button>
  </div>
</div>

<div class="divider"></div>

<!-- 생성 버튼 -->
<button class="generate-btn" id="generateBtn" onclick="generate()">
  ✦ 랜딩페이지 생성하기
</button>

<!-- 진행 상태 -->
<div class="progress-wrap" id="progressWrap">
  <div class="progress-header">
    <div class="spinner"></div>
    <span id="progressLabel">생성 중...</span>
  </div>
  <div class="step-list">
    <div class="step-row pending" id="step-0"><div class="step-dot"></div><span>기획서 분석</span></div>
    <div class="step-row pending" id="step-1"><div class="step-dot"></div><span>섹션 구조 생성</span></div>
    <div class="step-row pending" id="step-2"><div class="step-dot"></div><span>디자인 토큰 적용</span></div>
    <div class="step-row pending" id="step-3"><div class="step-dot"></div><span>Figma 프레임 생성</span></div>
  </div>
</div>

<!-- 완료 -->
<div class="success" id="successBox">
  <div class="success-icon">✅</div>
  <div class="success-title">생성 완료!</div>
  <div class="success-sub">Figma 캔버스를 확인하세요</div>
  <button class="reset-btn" onclick="resetUI()">다시 생성하기</button>
</div>

<!-- 에러 -->
<div class="error-box" id="errorBox"></div>

<script>
  let selectedClient = '엠플';
  let selectedType   = 'landing';
  let uploadedFile   = null;
  let currentStep    = -1;
  let stepTimer      = null;

  // ── 선택 핸들러 ──
  function selectClient(btn) {
    document.querySelectorAll('.client-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedClient = btn.dataset.client;
  }

  function selectType(btn) {
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedType = btn.dataset.type;
  }

  // ── 파일 핸들러 ──
  function handleDragOver(e) {
    e.preventDefault();
    document.getElementById('dropzone').classList.add('drag-over');
  }
  function handleDragLeave() {
    document.getElementById('dropzone').classList.remove('drag-over');
  }
  function handleDrop(e) {
    e.preventDefault();
    document.getElementById('dropzone').classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type === 'application/pdf') setFile(file);
    else showError('PDF 파일만 지원합니다.');
  }
  function handleFile(e) {
    const file = e.target.files[0];
    if (file) setFile(file);
  }
  function setFile(file) {
    uploadedFile = file;
    document.getElementById('fileName').textContent = file.name;
    document.getElementById('fileSize').textContent = formatSize(file.size);
    document.getElementById('fileInfo').classList.add('visible');
    hideError();
  }
  function removeFile() {
    uploadedFile = null;
    document.getElementById('fileInfo').classList.remove('visible');
    document.getElementById('fileInput').value = '';
  }
  function formatSize(bytes) {
    if (bytes < 1024) return bytes + 'B';
    if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + 'KB';
    return (bytes/(1024*1024)).toFixed(1) + 'MB';
  }

  // ── 생성 실행 ──
  function generate() {
    hideError();
    document.getElementById('generateBtn').disabled = true;
    document.getElementById('successBox').classList.remove('visible');
    document.getElementById('progressWrap').classList.add('visible');
    resetSteps();

    // step 0: 기획서 분석 시작
    setStep(0);

    if (uploadedFile) {
      // PDF → base64 변환 후 Figma로 전달
      const reader = new FileReader();
      reader.onload = (e) => {
        const base64 = e.target.result.split(',')[1];
        setStep(1);
        sendToFigma(base64);
      };
      reader.onerror = () => {
        showError('파일 읽기 실패. 다시 시도해주세요.');
        resetAfterError();
      };
      reader.readAsDataURL(uploadedFile);
    } else {
      // 파일 없이 기본 템플릿으로 생성
      setStep(1);
      sendToFigma(null);
    }
  }

  function sendToFigma(fileBase64) {
    parent.postMessage({
      pluginMessage: {
        type: 'generate',
        client: selectedClient,
        pageType: selectedType,
        hasFile: !!fileBase64,
        fileData: fileBase64   // ← 핵심: 실제 base64 데이터 전달
      }
    }, '*');
  }

  // ── 스텝 UI ──
  function resetSteps() {
    currentStep = -1;
    for (let i = 0; i < 4; i++) {
      const el = document.getElementById('step-' + i);
      el.className = 'step-row pending';
    }
  }

  function setStep(n) {
    // 이전 스텝 완료 처리
    if (currentStep >= 0) {
      const prev = document.getElementById('step-' + currentStep);
      if (prev) prev.className = 'step-row done';
    }
    currentStep = n;
    const cur = document.getElementById('step-' + n);
    if (cur) cur.className = 'step-row active';
  }

  function completeAllSteps() {
    for (let i = 0; i <= currentStep; i++) {
      const el = document.getElementById('step-' + i);
      if (el) el.className = 'step-row done';
    }
  }

  // ── 에러 / 리셋 ──
  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.textContent = '⚠ ' + msg;
    box.classList.add('visible');
  }
  function hideError() {
    document.getElementById('errorBox').classList.remove('visible');
  }
  function resetAfterError() {
    document.getElementById('generateBtn').disabled = false;
    document.getElementById('progressWrap').classList.remove('visible');
  }
  function resetUI() {
    document.getElementById('successBox').classList.remove('visible');
    document.getElementById('generateBtn').disabled = false;
    resetSteps();
  }

  // ── Figma → UI 메시지 수신 ──
  window.onmessage = (event) => {
    const msg = event.data.pluginMessage;
    if (!msg) return;

    if (msg.type === 'status') {
      // code.js에서 진행 상황 알림
      setStep(msg.step + 1);
    }

    if (msg.type === 'done') {
      setStep(3);
      completeAllSteps();
      setTimeout(() => {
        document.getElementById('progressWrap').classList.remove('visible');
        document.getElementById('successBox').classList.add('visible');
        document.getElementById('generateBtn').disabled = false;
      }, 400);
    }

    if (msg.type === 'error') {
      showError(msg.message || '알 수 없는 오류가 발생했습니다.');
      resetAfterError();
    }
  };
</script>
</body>
</html>
